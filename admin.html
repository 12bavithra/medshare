<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - MedShare</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;gap:16px;">
      <div class="logo">💙 MedShare</div>
      <nav>
        <a href="index.html">Home</a>
        <a href="admin.html" class="active">Admin</a>
        <a href="#" onclick="logout()">Logout</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="page-header">
      <h2>Admin Dashboard</h2>
      <p>Manage medicines, users, and approve requests</p>
    </div>

    <div class="admin-tabs">
      <button class="tab-btn active" data-tab="medicines">Medicines</button>
      <button class="tab-btn" data-tab="users">Users</button>
    </div>

    <div class="chart-section">
      <canvas id="adminChart"></canvas>
    </div>

    <!-- Medicines Tab -->
    <div class="tab-content active" id="medicinesTab">
      <h3>All Medicines</h3>
      <div class="medicines-list" id="adminMedicinesList">
        <!-- Medicines will be loaded here -->
      </div>
    </div>

    <!-- Users Tab -->
    <div class="tab-content" id="usersTab">
      <h3>All Users</h3>
      <div class="users-list" id="adminUsersList">
        <!-- Users will be loaded here -->
      </div>
    </div>

    <div class="loading" id="adminLoading" style="display: none;">
      <p>Loading data...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
